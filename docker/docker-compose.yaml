services:
  # Cloudflare Tunnel for secure access (OPTIONAL - only if using Cloudflare)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: superset_cloudflared
    restart: unless-stopped
    command: 
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
      - CLOUDFLARE_TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
      - CLOUDFLARE_HOSTNAME=${CLOUDFLARE_HOSTNAME:-localhost}
    depends_on:
      - superset
    profiles:
      - cloudflare  # Only runs when explicitly enabled with --profile cloudflare

  superset:
    # Version can be overridden by SUPERSET_VERSION env var or defaults to 3.1.0
    # To use version from system.yaml, set SUPERSET_VERSION before running docker-compose
    image: apache/superset:${SUPERSET_VERSION:-5.0.0}
    platform: linux/amd64  # For Apple Silicon compatibility
    container_name: superset_app
    command: ["sh", "-c", "superset db upgrade && superset fab create-admin --username $$SUPERSET_ADMIN_USERNAME --firstname Admin --lastname User --email $$SUPERSET_ADMIN_EMAIL --password $$SUPERSET_ADMIN_PASSWORD || true && superset init && gunicorn --bind 0.0.0.0:8088 --timeout 120 --workers 2 --worker-class gthread --threads 20 'superset.app:create_app()'"]
    restart: unless-stopped
    # Remove public port exposure when using Cloudflare
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    environment:
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY:-your-secret-key-here}
      - SUPERSET_ADMIN_USERNAME=${SUPERSET_ADMIN_USERNAME:-admin}
      - SUPERSET_ADMIN_PASSWORD=${SUPERSET_ADMIN_PASSWORD:-admin}
      - SUPERSET_ADMIN_EMAIL=${SUPERSET_ADMIN_EMAIL:-admin@example.com}
      - SUPERSET_LOAD_EXAMPLES=${SUPERSET_LOAD_EXAMPLES:-yes}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/superset_home/superset.db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - superset_home:/app/superset_home
      - ./local/superset_config_standard.py:/app/pythonpath/superset_config.py
    # Note: db and redis are optional - will use SQLite if not available
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  superset-init:
    image: apache/superset:${SUPERSET_VERSION:-5.0.0}
    platform: linux/amd64  # For Apple Silicon compatibility
    container_name: superset_init
    command: ["sh", "-c", "echo 'Initializing database...' && superset db upgrade && echo 'Database initialized!'"]
    environment:
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY:-your-secret-key-here}
      - SUPERSET_ADMIN_USERNAME=${SUPERSET_ADMIN_USERNAME:-admin}
      - SUPERSET_ADMIN_PASSWORD=${SUPERSET_ADMIN_PASSWORD:-admin}
      - SUPERSET_ADMIN_EMAIL=${SUPERSET_ADMIN_EMAIL:-admin@example.com}
      - SUPERSET_LOAD_EXAMPLES=${SUPERSET_LOAD_EXAMPLES:-yes}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/superset_home/superset.db}
    volumes:
      - superset_home:/app/superset_home
      - ./local/superset_config_standard.py:/app/pythonpath/superset_config.py
    # Note: db and redis are optional - will use SQLite if not available

  superset-worker:
    image: apache/superset:${SUPERSET_VERSION:-5.0.0}
    platform: linux/amd64  # For Apple Silicon compatibility
    container_name: superset_worker
    command: ["sh", "-c", "celery --app=superset.tasks.celery_app:app worker -l INFO"]
    restart: unless-stopped
    environment:
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY:-your-secret-key-here}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/superset_home/superset.db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - superset_home:/app/superset_home
      - ./local/superset_config_standard.py:/app/pythonpath/superset_config.py
    # Note: db and redis are optional - will use SQLite if not available
    profiles:
      - worker

  superset-beat:
    image: apache/superset:${SUPERSET_VERSION:-5.0.0}
    platform: linux/amd64  # For Apple Silicon compatibility
    container_name: superset_beat
    command: ["sh", "-c", "celery --app=superset.tasks.celery_app:app beat -l INFO"]
    restart: unless-stopped
    environment:
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY:-your-secret-key-here}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/superset_home/superset.db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - superset_home:/app/superset_home
      - ./local/superset_config_standard.py:/app/pythonpath/superset_config.py
    # Note: db and redis are optional - will use SQLite if not available
    profiles:
      - worker

  # PostgreSQL Database (OPTIONAL - use --profile postgres to enable)
  db:
    image: postgres:15-alpine
    container_name: superset_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DATABASE_NAME:-superset}
      - POSTGRES_USER=${DATABASE_USER:-superset}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-superset}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-superset}"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - postgres  # Only runs with --profile postgres

  # Redis Cache (OPTIONAL - use --profile redis or --profile postgres to enable)
  redis:
    image: redis:7-alpine
    container_name: superset_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - redis
      - postgres  # Also enabled with postgres profile

  # Monitoring stack (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: superset_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: superset_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    profiles:
      - monitoring

volumes:
  superset_home:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: superset-network