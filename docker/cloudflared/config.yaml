# Cloudflare Tunnel Configuration
# This file defines the services that will be accessible through the tunnel

# The tunnel token is provided via environment variable TUNNEL_TOKEN
# or CLOUDFLARE_TUNNEL_TOKEN in docker-compose

# Ingress rules - define which services to expose
ingress:
  # Main Superset application
  - hostname: "${CLOUDFLARE_HOSTNAME}"
    service: http://superset:8088
    originRequest:
      noTLSVerify: true
      connectTimeout: 30s
      
  # Grafana monitoring (if using subdomain)
  - hostname: "grafana.${CLOUDFLARE_HOSTNAME#*.}"
    service: http://grafana:3000
    originRequest:
      noTLSVerify: true
      
  # Prometheus metrics (if using subdomain)
  - hostname: "prometheus.${CLOUDFLARE_HOSTNAME#*.}"
    service: http://prometheus:9090
    originRequest:
      noTLSVerify: true
      
  # Catch-all rule (required)
  - service: http_status:404

# Optional: Configure additional tunnel settings
# tunnel: YOUR-TUNNEL-ID
# credentials-file: /path/to/credentials.json