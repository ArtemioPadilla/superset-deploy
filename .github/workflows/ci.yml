name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]
        
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/pip
          .venv
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        make setup
    
    - name: Run tests
      run: |
        make test
    
    - name: Validate configuration
      run: |
        cp system.yaml.example system.yaml
        make validate

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Validate Docker Compose
      run: |
        docker-compose -f docker/docker-compose.yaml config --quiet
        docker-compose -f docker/docker-compose.yaml -f docker/docker-compose.local.yaml config --quiet

  recommended-version:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11 (Recommended)
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    
    - name: Full test suite with Python 3.11
      run: |
        python -m pip install --upgrade pip
        make setup
        make test
        cp system.yaml.example system.yaml
        make validate